<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>PMO 업무수행 관리시스템 · 월별가동현황</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<link rel="stylesheet" href="../_shared/pmo-tokens.css" />
<style>
  /* ----- monthly detail table ----- */
  .monthly-detail { table-layout: auto; border-collapse: separate; border-spacing: 0; min-width: 1100px; }
  .monthly-detail thead th {
    padding: 10px 12px;
    border-bottom: 1px solid var(--line-2);
    white-space: nowrap;
    font-size: 12px;
  }
  .monthly-detail tbody td {
    padding: 11px 12px;
    border-bottom: 1px solid var(--line-1);
    white-space: nowrap;
    font-size: 13px;
  }
  .monthly-detail tbody tr:last-child td { border-bottom: 0; }
  .monthly-detail tbody tr.md-total td {
    border-top: 2px solid var(--brand-line);
    background: var(--brand-bg) !important;
  }
  .monthly-scroll::-webkit-scrollbar { height: 10px; }
  .monthly-scroll::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 999px; }
  .monthly-scroll::-webkit-scrollbar-thumb:hover { background: var(--tx-5); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
</head>
<body>
<div id="root"></div>
<!-- 외부 jsx는 정적 서버 위에서만 fetch 가능. 예: npx serve "docs/design/claude design" -->
<script type="text/babel" data-presets="env,react" src="../_shared/pmo-primitives.jsx"></script>
<script type="text/babel" data-presets="env,react" src="../_shared/pmo-shell.jsx"></script>
<script type="text/babel" data-presets="env,react" src="monthly.jsx"></script>
<script type="text/babel" data-presets="env,react">
(async () => {
  const data = await fetch("monthly.json").then((r) => r.json());
  ReactDOM.createRoot(document.getElementById("root")).render(<MonthlyPage data={data} />);
})();
</script>
</body>
</html>
